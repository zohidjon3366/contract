services:
  - type: web
    name: all-finance-contract
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: NODE_ENV
        value: production
